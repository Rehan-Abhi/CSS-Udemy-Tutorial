<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up krlo jii</title>
    <style>
        body{
            background-color: #2a2a2a;
            height: 100vh; /* vh means veiwport height. */
            margin:0 ; /* browser has some default margin, we are setting it to 0*/
            padding:0 ; /* browser has some default padding, we are setting it to 0*/
            display: flex;
            justify-content: center; /*Aligns items along the main axis (horizontal by default).*/
            align-items: center;  /*Aligns items along the cross axis (vertical by default).*/
        }
        .card{
            background-color: #f6f3f3;
            border-radius: 8px;
            padding: 40px; /*note-> padding means internal breathing space, space bwteen the content and border of the element*/
            width: 300px;
        }

        h2{
            color: #246194;
            text-align: center;
            margin-bottom: 30px;
        }
        form{
            display: flex;
            flex-direction: column;
            

        }
        .name_row{
            display: flex; /* flex by default arranges the elements horizontally*/
            gap: 10px;
            justify-content: center;
            
        
        }
        input{
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 15px;
        }
        button{
            background-color: #246194;
            padding:10px ;
            border-radius: 8px;
        }
        button:hover {
        background-color: #0741ac;
      }

    </style>
</head>
<body> 
    <div class="card">
        <h2>Sign Up</h2>
        <form>
            <input type="email" placeholder="Email">
            <div class="name_row">
                <input type="first name" placeholder="First Name">
                <input type="last name" placeholder="Last Name">
            </div>
            <input type="password" placeholder="Password">
            <button type="submit">Sign Up</button>
        </form>
     </div>

    
</body>
</html>
